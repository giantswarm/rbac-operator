# This rule is not used by the project rbac-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the auth.giantswarm.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rbac-operator
    app.kubernetes.io/managed-by: kustomize
  name: rolebindingtemplate-editor-role
rules:
- apiGroups:
  - auth.giantswarm.io
  resources:
  - rolebindingtemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - auth.giantswarm.io
  resources:
  - rolebindingtemplates/status
  verbs:
  - get
