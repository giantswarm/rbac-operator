# This rule is not used by the project rbac-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to auth.giantswarm.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rbac-operator
    app.kubernetes.io/managed-by: kustomize
  name: rolebindingtemplate-viewer-role
rules:
- apiGroups:
  - auth.giantswarm.io
  resources:
  - rolebindingtemplates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - auth.giantswarm.io
  resources:
  - rolebindingtemplates/status
  verbs:
  - get
